<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Find Enough">
<title>Find Enough</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF; --bg2: #EDE9E2; --bg3: #E2DDD5;
    --text: #2A2520; --text2: #7A7068; --text3: #A89F95;
    --green: #3A7D5C; --green-light: #D4EDE1;
    --amber: #C8771A; --amber-light: #FAE8CC;
    --rose: #B85C6E; --rose-light: #F5D9E0;
    --purple: #6B5EA8; --purple-light: #E4DFFA;
    --border: rgba(42,37,32,0.10); --radius: 18px;
    --safe-top: env(safe-area-inset-top,0px);
    --safe-bottom: env(safe-area-inset-bottom,0px);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; max-width:430px; margin:0 auto; overflow-x:hidden; }

  .screen { display:none; flex-direction:column; min-height:100dvh; padding-top:calc(var(--safe-top) + 12px); padding-bottom:calc(var(--safe-bottom) + 80px); }
  .screen.active { display:flex; }
  .header { padding:16px 24px 8px; }
  .header-row { display:flex; align-items:center; justify-content:space-between; }
  .app-title { font-family:'DM Serif Display',serif; font-size:28px; letter-spacing:-0.5px; }
  .app-date { font-size:13px; color:var(--text3); margin-top:2px; font-weight:300; }
  .icon-btn { width:38px; height:38px; border-radius:12px; background:var(--bg2); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.15s; flex-shrink:0; }
  .icon-btn:active { background:var(--bg3); }
  .header-btns { display:flex; gap:8px; }
  .scroll-area { flex:1; overflow-y:auto; padding:8px 20px; -webkit-overflow-scrolling:touch; }
  .section-heading { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text3); margin:20px 0 10px; }

  .balance-card { background:var(--text); color:var(--bg); border-radius:var(--radius); padding:20px; margin-bottom:16px; position:relative; overflow:hidden; }
  .balance-card::before { content:''; position:absolute; right:-20px; top:-20px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .balance-label { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.5; margin-bottom:6px; }
  .balance-score { font-family:'DM Serif Display',serif; font-size:48px; line-height:1; }
  .balance-desc { font-size:13px; opacity:0.6; margin-top:6px; font-weight:300; }
  .balance-chips { display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; }
  .balance-chip { font-size:11px; padding:4px 10px; border-radius:20px; background:rgba(255,255,255,0.12); }
  .balance-chip.done { background:rgba(58,125,92,0.5); }

  .activity-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:transform 0.1s,background 0.15s; }
  .activity-card:active { transform:scale(0.98); background:var(--bg2); }
  .activity-card.enough { background:var(--green-light); border-color:rgba(58,125,92,0.2); }
  .activity-icon-wrap { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .activity-body { flex:1; min-width:0; }
  .activity-name { font-size:16px; font-weight:500; }
  .activity-meta { font-size:12px; color:var(--text3); margin-top:2px; }
  .status-badge { font-size:11px; font-weight:500; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .status-badge.enough { background:var(--green); color:#fff; }
  .status-badge.active { background:var(--amber-light); color:var(--amber); }
  .status-badge.none { background:var(--bg2); color:var(--text3); }
  .dot-row { display:flex; gap:4px; margin-top:5px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--bg3); }
  .dot.on { background:var(--purple); } .dot.enough { background:var(--green); }

  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(247,244,239,0.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; padding-bottom:var(--safe-bottom); z-index:100; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 0 8px; cursor:pointer; gap:3px; }
  .nav-icon { font-size:20px; } .nav-label { font-size:10px; color:var(--text3); }
  .nav-item.active .nav-label { color:var(--text); font-weight:500; }

  .session-back { display:flex; align-items:center; gap:8px; padding:12px 20px; cursor:pointer; }
  .session-back-label { font-size:14px; color:var(--text2); }
  .session-body { flex:1; display:flex; flex-direction:column; align-items:center; padding:20px; }
  .session-icon-big { width:80px; height:80px; border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:44px; margin-bottom:12px; }
  .session-name { font-family:'DM Serif Display',serif; font-size:28px; }
  .timer-big { font-family:'DM Serif Display',serif; font-size:56px; margin:16px 0 4px; letter-spacing:-1px; }
  .timer-sub { font-size:13px; color:var(--text3); margin-bottom:24px; }
  .nudge-card { width:100%; background:var(--bg2); border-radius:var(--radius); padding:16px; margin-bottom:20px; }
  .nudge-title { font-size:13px; color:var(--text2); margin-bottom:10px; text-align:center; font-weight:300; font-style:italic; }
  .mood-row { display:flex; gap:8px; }
  .mood-btn { flex:1; padding:10px 4px; border-radius:12px; border:1px solid var(--border); background:var(--bg); cursor:pointer; text-align:center; transition:all 0.15s; }
  .mood-btn.selected { border-color:var(--purple); background:var(--purple-light); }
  .mood-emoji { font-size:20px; display:block; } .mood-label { font-size:10px; color:var(--text3); display:block; margin-top:2px; }
  .mood-btn.selected .mood-label { color:var(--purple); }
  .session-actions { width:100%; display:flex; flex-direction:column; gap:10px; }
  .btn-enough { background:var(--green); color:#fff; border:none; border-radius:16px; padding:16px; font-size:16px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; }
  .btn-enough:active { opacity:0.85; }
  .btn-remind { background:var(--bg2); color:var(--text2); border:none; border-radius:16px; padding:14px; font-size:14px; font-family:'DM Sans',sans-serif; cursor:pointer; }
  .btn-stop { background:transparent; color:var(--rose); border:1px solid rgba(184,92,110,0.3); border-radius:16px; padding:12px; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; }

  .stat-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .stat-card { background:var(--bg2); border-radius:14px; padding:14px; }
  .stat-num { font-family:'DM Serif Display',serif; font-size:30px; }
  .stat-label { font-size:11px; color:var(--text3); margin-top:2px; }
  .insight-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .insight-heading { font-size:13px; font-weight:500; margin-bottom:12px; }
  .bar-item { margin-bottom:10px; }
  .bar-top { display:flex; justify-content:space-between; margin-bottom:4px; }
  .bar-name { font-size:13px; } .bar-val { font-size:12px; color:var(--text3); }
  .bar-track { height:7px; background:var(--bg2); border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; }
  .obs-text { font-size:13px; color:var(--text2); line-height:1.65; font-style:italic; margin-bottom:10px; }
  .obs-text strong { color:var(--text); font-style:normal; }
  .log-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .log-item:last-child { border-bottom:none; }
  .log-emoji { font-size:18px; } .log-body { flex:1; }
  .log-name { font-size:14px; font-weight:500; } .log-meta { font-size:12px; color:var(--text3); margin-top:1px; }

  .manage-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; }
  .manage-item { display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--border); }
  .manage-item:last-child { border-bottom:none; }
  .manage-emoji { font-size:22px; width:36px; text-align:center; }
  .manage-name { flex:1; font-size:15px; }
  .manage-actions { display:flex; gap:6px; }
  .manage-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--bg2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .manage-btn.del { color:var(--rose); border-color:rgba(184,92,110,0.25); background:var(--rose-light); }
  .manage-btn:active { opacity:0.7; }
  .add-form { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
  .add-form-title { font-size:14px; font-weight:500; margin-bottom:12px; }
  .form-row { display:flex; gap:8px; margin-bottom:10px; }
  .form-input { flex:1; background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; }
  .form-input:focus { border-color:var(--purple); }
  .emoji-input { width:56px; text-align:center; font-size:22px; flex-shrink:0; }
  .color-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .color-swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .color-swatch.selected { border-color:var(--text); }
  .btn-add { background:var(--text); color:var(--bg); border:none; border-radius:12px; padding:10px 20px; font-size:14px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; }

  .toast { position:fixed; bottom:calc(var(--safe-bottom) + 90px); left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:var(--bg); padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:200; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .empty-state { text-align:center; padding:30px 16px; }
  .empty-text { font-size:14px; color:var(--text3); line-height:1.6; }
</style>
</head>
<body>

<!-- TODAY -->
<div class="screen active" id="screen-today">
  <div class="header">
    <div class="header-row">
      <div><div class="app-title">find enough</div><div class="app-date" id="today-date"></div></div>
      <div class="header-btns">
        <button class="icon-btn" onclick="showScreen('manage')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="9" r="2.5"/><path d="M9 2v2M9 14v2M2 9h2M14 9h2M4.1 4.1l1.4 1.4M12.5 12.5l1.4 1.4M4.1 13.9l1.4-1.4M12.5 5.5l1.4-1.4"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="scroll-area">
    <div class="balance-card">
      <div class="balance-label">Today's balance</div>
      <div class="balance-score" id="balance-score">—</div>
      <div class="balance-desc" id="balance-desc">Tap an activity to start tracking</div>
      <div class="balance-chips" id="balance-chips"></div>
    </div>
    <div class="section-heading">Your activities</div>
    <div id="activity-list"></div>
  </div>
</div>

<!-- SESSION -->
<div class="screen" id="screen-session">
  <div class="session-back" onclick="endSession(false)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
    <span class="session-back-label">Back</span>
  </div>
  <div class="session-body">
    <div class="session-icon-big" id="session-icon-big"></div>
    <div class="session-name" id="session-name"></div>
    <div class="timer-big" id="timer-display">0:00</div>
    <div class="timer-sub">session time</div>
    <div class="nudge-card" id="nudge-card" style="display:none">
      <div class="nudge-title">How are you feeling right now?</div>
      <div class="mood-row">
        <button class="mood-btn" onclick="selectMood('flow')" id="mood-flow"><span class="mood-emoji">😌</span><span class="mood-label">Flow</span></button>
        <button class="mood-btn" onclick="selectMood('good')" id="mood-good"><span class="mood-emoji">🙂</span><span class="mood-label">Good</span></button>
        <button class="mood-btn" onclick="selectMood('meh')" id="mood-meh"><span class="mood-emoji">😶</span><span class="mood-label">Meh</span></button>
        <button class="mood-btn" onclick="selectMood('guilt')" id="mood-guilt"><span class="mood-emoji">😬</span><span class="mood-label">Guilt</span></button>
      </div>
    </div>
    <!-- Confirm end panel — shown when user taps a stop button -->
    <div id="confirm-end" style="display:none; width:100%; background:var(--bg2); border-radius:var(--radius); padding:16px; margin-bottom:20px;">
      <div style="font-size:13px; color:var(--text2); margin-bottom:10px; text-align:center; font-style:italic;">How did that feel?</div>
      <div class="mood-row" style="margin-bottom:14px;">
        <button class="mood-btn" onclick="selectEndMood('flow')" id="end-mood-flow"><span class="mood-emoji">😌</span><span class="mood-label">Flow</span></button>
        <button class="mood-btn" onclick="selectEndMood('good')" id="end-mood-good"><span class="mood-emoji">🙂</span><span class="mood-label">Good</span></button>
        <button class="mood-btn" onclick="selectEndMood('meh')" id="end-mood-meh"><span class="mood-emoji">😶</span><span class="mood-label">Meh</span></button>
        <button class="mood-btn" onclick="selectEndMood('guilt')" id="end-mood-guilt"><span class="mood-emoji">😬</span><span class="mood-label">Guilt</span></button>
      </div>
      <button class="btn-enough" id="confirm-enough-btn" onclick="confirmEnd()">✓ That's enough for today</button>
      <button class="btn-stop" id="confirm-stop-btn" onclick="confirmEnd()" style="margin-top:10px; display:none;">Stop without marking enough</button>
    </div>
    <div class="session-actions" id="session-actions">
      <button class="btn-enough" onclick="promptEnd(true)">✓ That's enough for today</button>
      <button class="btn-remind" onclick="snoozeReminder()">Remind me in 30 min</button>
      <button class="btn-stop" onclick="promptEnd(false)">Stop without marking enough</button>
    </div>
  </div>
</div>

<!-- INSIGHTS -->
<div class="screen" id="screen-insights">
  <div class="header">
    <div class="header-row">
      <div><div class="app-title">insights</div><div class="app-date">past 7 days</div></div>
    </div>
  </div>
  <div class="scroll-area" id="insights-content"></div>
</div>

<!-- MANAGE -->
<div class="screen" id="screen-manage">
  <div class="header">
    <div class="header-row">
      <div><div class="app-title">manage</div><div class="app-date">your activities</div></div>
      <button class="icon-btn" onclick="showScreen('today')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 4L4 12M4 4l8 8"/></svg>
      </button>
    </div>
  </div>
  <div class="scroll-area">
    <div class="add-form">
      <div class="add-form-title">Add an activity</div>
      <div class="form-row">
        <input class="form-input emoji-input" id="new-emoji" maxlength="2" placeholder="🌟">
        <input class="form-input" id="new-name" placeholder="Activity name" maxlength="30">
      </div>
      <div class="color-row" id="color-picker"></div>
      <button class="btn-add" onclick="addActivity()">Add activity</button>
    </div>
    <div class="section-heading">Your activities</div>
    <div class="manage-card" id="manage-list"></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-today" onclick="showScreen('today')"><span class="nav-icon">🌱</span><span class="nav-label">Today</span></div>
  <div class="nav-item" id="nav-insights" onclick="showScreen('insights')"><span class="nav-icon">✦</span><span class="nav-label">Insights</span></div>
  <div class="nav-item" id="nav-manage" onclick="showScreen('manage')"><span class="nav-icon">⚙︎</span><span class="nav-label">Manage</span></div>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────
const STORE = 'findEnough_v3';
const COLORS = [
  {id:'purple',bg:'#E4DFFA',dot:'#6B5EA8'},{id:'green',bg:'#D4EDE1',dot:'#3A7D5C'},
  {id:'amber',bg:'#FAE8CC',dot:'#C8771A'},{id:'rose',bg:'#F5D9E0',dot:'#B85C6E'},
  {id:'blue',bg:'#D8EAF8',dot:'#3A6EA8'},{id:'teal',bg:'#D4EDE8',dot:'#2E7D72'},
];
const DEFAULTS = [
  {id:'piano', name:'Piano',       emoji:'🎹', colorId:'purple', order:0},
  {id:'read',  name:'Reading',     emoji:'📖', colorId:'green',  order:1},
  {id:'games', name:'Video games', emoji:'🎮', colorId:'amber',  order:2},
  {id:'tv',    name:'TV / Shows',  emoji:'📺', colorId:'rose',   order:3},
  {id:'knit',  name:'Knitting',    emoji:'🧶', colorId:'teal',   order:4},
];

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch { return {}; }
}
function saveStore(d) {
  localStorage.setItem(STORE, JSON.stringify(d));
}
function getStore() {
  const d = loadStore();
  if (!d.activities) d.activities = DEFAULTS.map(a=>({...a}));
  if (!d.sessions)   d.sessions   = [];
  saveStore(d);
  return d;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedColorId = 'purple';
let timerInterval = null, sessionStart = null;
let sessionActivityId = null, sessionMood = null;
let sessionSeconds = 0, nudgeShown = false, reminderTimeout = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtTime(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
}
function fmtMins(s) {
  if(s<60) return s+'s';
  const m=Math.round(s/60);
  if(m<60) return m+' min';
  const h=Math.floor(m/60),r=m%60;
  return r?`${h}h ${r}m`:`${h}h`;
}
let _tt;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const nav=document.getElementById('nav-'+name);
  if(nav) nav.classList.add('active');
  if(name==='today')    renderToday();
  if(name==='insights') renderInsights();
  if(name==='manage')   renderManage();
}

// ── TODAY ─────────────────────────────────────────────────────────────────────
function renderToday() {
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const d = getStore();
  const todaySess = d.sessions.filter(s=>s.date===todayStr());
  const enoughIds = new Set(todaySess.filter(s=>s.enough).map(s=>s.activityId));
  const enoughCount = d.activities.filter(a=>enoughIds.has(a.id)).length;
  const touched = new Set(todaySess.map(s=>s.activityId)).size;

  let score='—', desc='Tap an activity to start tracking';
  if(d.activities.length>0 && (enoughCount>0||touched>0)) {
    const pct=Math.round(enoughCount/d.activities.length*100);
    score=pct+'%';
    desc=pct===0?'Just getting started — that\'s fine.':pct<40?'A few moments of enough today.':pct<75?'Good balance building today.':'Beautifully balanced day.';
  }
  document.getElementById('balance-score').textContent=score;
  document.getElementById('balance-desc').textContent=desc;
  document.getElementById('balance-chips').innerHTML=d.activities.map(a=>
    `<span class="balance-chip ${enoughIds.has(a.id)?'done':''}">${a.emoji} ${a.name}</span>`
  ).join('');

  const list=document.getElementById('activity-list');
  if(d.activities.length===0){
    list.innerHTML='<div class="empty-state"><div class="empty-text">No activities yet.<br>Go to Manage to add some.</div></div>';
    return;
  }
  list.innerHTML=d.activities.map(a=>{
    const actS=todaySess.filter(s=>s.activityId===a.id);
    const isEnough=enoughIds.has(a.id), isActive=sessionActivityId===a.id;
    const totalSec=actS.reduce((sum,s)=>sum+(s.duration||0),0)+(isActive?sessionSeconds:0);
    const color=COLORS.find(c=>c.id===a.colorId)||COLORS[0];
    const filled=isEnough?5:Math.min(actS.length,4);
    const dots=Array.from({length:5},(_,i)=>`<span class="dot ${isEnough?'enough':i<filled?'on':''}"></span>`).join('');
    const badge=isActive?`<span class="status-badge active">Active</span>`:isEnough?`<span class="status-badge enough">Enough ✓</span>`:`<span class="status-badge none">${totalSec>0?fmtMins(totalSec):'Start'}</span>`;
    return `<div class="activity-card ${isEnough?'enough':''}" onclick="startSession('${a.id}')">
      <div class="activity-icon-wrap" style="background:${color.bg}">${a.emoji}</div>
      <div class="activity-body"><div class="activity-name">${a.name}</div><div class="dot-row">${dots}</div><div class="activity-meta">${totalSec>0?fmtMins(totalSec)+' today':'Not started'}</div></div>
      <div>${badge}</div></div>`;
  }).join('');
}

// ── SESSION ───────────────────────────────────────────────────────────────────
function startSession(id) {
  const d=getStore();
  const act=d.activities.find(a=>a.id===id);
  if(!act) return;
  const todaySess=d.sessions.filter(s=>s.date===todayStr());
  if(todaySess.some(s=>s.activityId===id&&s.enough)){showToast(`You've already found enough ${act.name} today 🌿`);return;}
  sessionActivityId=id; sessionStart=Date.now(); sessionSeconds=0; sessionMood=null; nudgeShown=false;
  // Persist active session so timer survives app close
  localStorage.setItem('findEnough_activeSession', JSON.stringify({activityId:id, startTime:sessionStart}));
  const color=COLORS.find(c=>c.id===act.colorId)||COLORS[0];
  document.getElementById('session-icon-big').style.background=color.bg;
  document.getElementById('session-icon-big').textContent=act.emoji;
  document.getElementById('session-name').textContent=act.name;
  document.getElementById('nudge-card').style.display='none';
  document.getElementById('confirm-end').style.display='none';
  document.getElementById('session-actions').style.display='flex';
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('[id^="end-mood-"]').forEach(b=>b.classList.remove('selected'));
  showScreen('session');
  document.getElementById('nav-today').classList.add('active');
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    sessionSeconds=Math.floor((Date.now()-sessionStart)/1000);
    document.getElementById('timer-display').textContent=fmtTime(sessionSeconds);
    if(!nudgeShown&&sessionSeconds>=300){document.getElementById('nudge-card').style.display='block';nudgeShown=true;}
  },1000);
}

function selectMood(mood) {
  sessionMood=mood;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('mood-'+mood).classList.add('selected');
}

let _pendingEnough = false;
function promptEnd(markEnough) {
  _pendingEnough = markEnough;
  // Reset end mood buttons
  document.querySelectorAll('[id^="end-mood-"]').forEach(b=>b.classList.remove('selected'));
  sessionMood = null;
  // Show correct confirm button
  document.getElementById('confirm-enough-btn').style.display = markEnough ? 'block' : 'none';
  document.getElementById('confirm-stop-btn').style.display = markEnough ? 'none' : 'block';
  // Swap panels
  document.getElementById('session-actions').style.display = 'none';
  document.getElementById('nudge-card').style.display = 'none';
  document.getElementById('confirm-end').style.display = 'block';
}

function selectEndMood(mood) {
  sessionMood = mood;
  document.querySelectorAll('[id^="end-mood-"]').forEach(b=>b.classList.remove('selected'));
  document.getElementById('end-mood-'+mood).classList.add('selected');
}

function confirmEnd() {
  endSession(_pendingEnough);
}

function snoozeReminder() {
  showToast('Reminder set for 30 minutes');
  clearTimeout(reminderTimeout);
  reminderTimeout=setTimeout(()=>{document.getElementById('nudge-card').style.display='block';showToast('30 minutes have passed 🌿');},30*60*1000);
}

function endSession(markEnough) {
  clearInterval(timerInterval); clearTimeout(reminderTimeout);
  if(sessionActivityId && sessionSeconds>5) {
    const d=getStore();
    d.sessions.push({id:'s_'+Date.now(), activityId:sessionActivityId, date:todayStr(), duration:sessionSeconds, enough:markEnough, mood:sessionMood, ts:Date.now()});
    saveStore(d);
    if(markEnough) showToast('Enough found. Well done 🌿');
  }
  sessionActivityId=null; sessionSeconds=0;
  localStorage.removeItem('findEnough_activeSession');
  showScreen('today');
}

// ── INSIGHTS ──────────────────────────────────────────────────────────────────
function renderInsights() {
  const d=getStore();
  const today=new Date();
  const last7=Array.from({length:7},(_,i)=>{const x=new Date(today);x.setDate(x.getDate()-i);return x.toISOString().slice(0,10);});
  const recent=d.sessions.filter(s=>last7.includes(s.date));
  const totalMins=Math.round(recent.reduce((sum,s)=>sum+(s.duration||0),0)/60);
  const enoughCount=recent.filter(s=>s.enough).length;
  const activeDays=new Set(recent.map(s=>s.date)).size;
  const actTimes=d.activities.map(a=>{
    const secs=recent.filter(s=>s.activityId===a.id).reduce((sum,s)=>sum+(s.duration||0),0);
    const moods=recent.filter(s=>s.activityId===a.id&&s.mood).map(s=>s.mood);
    return{...a,secs,moods};
  }).sort((a,b)=>b.secs-a.secs);
  const maxSecs=Math.max(...actTimes.map(a=>a.secs),1);
  const obs=[];
  actTimes.forEach(a=>{
    if(a.secs===0) obs.push(`<strong>${a.emoji} ${a.name}</strong> hasn't been visited this week. Might be worth a moment.`);
    const neg=a.moods.filter(m=>m==='guilt'||m==='meh').length;
    if(neg>=2) obs.push(`You rated <strong>${a.emoji} ${a.name}</strong> as "meh" or "guilt" ${neg} times. Notice what was different on those sessions.`);
  });
  if(enoughCount===0&&recent.length>0) obs.push(`You haven't marked any activity as "enough" yet. Try it — it's a small but powerful moment.`);
  if(enoughCount>=5) obs.push(`<strong>${enoughCount} "enough" moments</strong> this week. You're building the habit of noticing satisfaction.`);

  document.getElementById('insights-content').innerHTML=`
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${totalMins}</div><div class="stat-label">minutes tracked</div></div>
      <div class="stat-card"><div class="stat-num">${enoughCount}</div><div class="stat-label">enough moments</div></div>
      <div class="stat-card"><div class="stat-num">${activeDays}</div><div class="stat-label">active days</div></div>
      <div class="stat-card"><div class="stat-num">${d.activities.length}</div><div class="stat-label">activities</div></div>
    </div>
    <div class="insight-card">
      <div class="insight-heading">Time this week</div>
      ${actTimes.length===0?'<div class="obs-text">No sessions yet.</div>':actTimes.map(a=>{
        const color=COLORS.find(c=>c.id===a.colorId)||COLORS[0];
        const pct=Math.round(a.secs/maxSecs*100);
        return`<div class="bar-item"><div class="bar-top"><span class="bar-name">${a.emoji} ${a.name}</span><span class="bar-val">${fmtMins(a.secs)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color.dot}"></div></div></div>`;
      }).join('')}
    </div>
    ${obs.length>0?`<div class="insight-card"><div class="insight-heading">Gentle observations</div>${obs.map(o=>`<p class="obs-text">${o}</p>`).join('')}</div>`:''}
    <div class="insight-card">
      <div class="insight-heading">Recent sessions</div>
      ${d.sessions.length===0?'<div class="obs-text">No sessions yet.</div>':d.sessions.slice().reverse().slice(0,12).map(s=>{
        const act=d.activities.find(a=>a.id===s.activityId);if(!act)return'';
        const me={flow:'😌',good:'🙂',meh:'😶',guilt:'😬'}[s.mood]||'';
        const dt=new Date(s.ts);
        return`<div class="log-item"><div class="log-emoji">${act.emoji}</div><div class="log-body"><div class="log-name">${act.name} ${s.enough?'🌿':''}</div><div class="log-meta">${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${fmtMins(s.duration)}</div></div><div>${me}</div></div>`;
      }).join('')}
    </div>`;
}

// ── MANAGE ────────────────────────────────────────────────────────────────────
function renderManage() {
  document.getElementById('color-picker').innerHTML=COLORS.map(c=>
    `<div class="color-swatch ${c.id===selectedColorId?'selected':''}" style="background:${c.bg};border-color:${c.id===selectedColorId?c.dot:'transparent'}" onclick="selectColor('${c.id}')"></div>`
  ).join('');
  const d=getStore();
  const ml=document.getElementById('manage-list');
  if(d.activities.length===0){ml.innerHTML='<div class="empty-state"><div class="empty-text">No activities yet.</div></div>';return;}
  ml.innerHTML=d.activities.map((a,i)=>{
    const color=COLORS.find(c=>c.id===a.colorId)||COLORS[0];
    return`<div class="manage-item">
      <div class="manage-emoji">${a.emoji}</div>
      <div class="manage-name">${a.name}</div>
      <div style="width:10px;height:10px;border-radius:50%;background:${color.dot};margin-right:4px;flex-shrink:0"></div>
      <div class="manage-actions">
        ${i>0?`<button class="manage-btn" onclick="moveActivity(${i},-1)">↑</button>`:'<div style="width:30px"></div>'}
        ${i<d.activities.length-1?`<button class="manage-btn" onclick="moveActivity(${i},1)">↓</button>`:'<div style="width:30px"></div>'}
        <button class="manage-btn del" onclick="deleteActivity('${a.id}')">✕</button>
      </div></div>`;
  }).join('');
}

function selectColor(id){selectedColorId=id;renderManage();}

function addActivity() {
  const emoji=document.getElementById('new-emoji').value.trim()||'⭐';
  const name=document.getElementById('new-name').value.trim();
  if(!name){showToast('Please enter a name');return;}
  const d=getStore();
  d.activities.push({id:'act_'+Date.now(),name,emoji,colorId:selectedColorId,order:d.activities.length});
  saveStore(d);
  document.getElementById('new-emoji').value='';
  document.getElementById('new-name').value='';
  selectedColorId='purple';
  renderManage();
  showToast(`${emoji} ${name} added`);
}

function deleteActivity(id) {
  const d=getStore();
  d.activities=d.activities.filter(a=>a.id!==id);
  d.sessions=d.sessions.filter(s=>s.activityId!==id);
  saveStore(d);
  renderManage();
  showToast('Activity removed');
}

function moveActivity(index,dir) {
  const d=getStore();
  const ni=index+dir;
  if(ni<0||ni>=d.activities.length)return;
  [d.activities[index],d.activities[ni]]=[d.activities[ni],d.activities[index]];
  saveStore(d);
  renderManage();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
getStore();

// Restore any active session that was interrupted
(function restoreSession() {
  try {
    const saved = localStorage.getItem('findEnough_activeSession');
    if (!saved) { renderToday(); return; }
    const { activityId, startTime } = JSON.parse(saved);
    const d = getStore();
    const act = d.activities.find(a => a.id === activityId);
    if (!act) { localStorage.removeItem('findEnough_activeSession'); renderToday(); return; }
    // Restore session state with original start time
    sessionActivityId = activityId;
    sessionStart = startTime;
    sessionSeconds = Math.floor((Date.now() - startTime) / 1000);
    sessionMood = null;
    nudgeShown = sessionSeconds >= 300;
    const color = COLORS.find(c => c.id === act.colorId) || COLORS[0];
    document.getElementById('session-icon-big').style.background = color.bg;
    document.getElementById('session-icon-big').textContent = act.emoji;
    document.getElementById('session-name').textContent = act.name;
    document.getElementById('nudge-card').style.display = nudgeShown ? 'block' : 'none';
    document.getElementById('confirm-end').style.display = 'none';
    document.getElementById('session-actions').style.display = 'flex';
    // Start timer ticking from restored time
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      sessionSeconds = Math.floor((Date.now() - sessionStart) / 1000);
      document.getElementById('timer-display').textContent = fmtTime(sessionSeconds);
      if (!nudgeShown && sessionSeconds >= 300) {
        document.getElementById('nudge-card').style.display = 'block';
        nudgeShown = true;
      }
    }, 1000);
    document.getElementById('timer-display').textContent = fmtTime(sessionSeconds);
    // Go straight to session screen
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('screen-session').classList.add('active');
    document.getElementById('nav-today').classList.add('active');
  } catch(e) {
    localStorage.removeItem('findEnough_activeSession');
    renderToday();
  }
})();
</script>
